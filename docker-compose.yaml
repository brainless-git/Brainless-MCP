services:
  brainless-mcp:
    build: .
    ports:
      - "8000:8000"
    environment:
      BRAINLESS_MCP_TRANSPORT: http
      BRAINLESS_MCP_PORT: "8000"
      UNRAID_API_URL: "${UNRAID_API_URL}"
      UNRAID_API_KEY: "${UNRAID_API_KEY}"
      UNRAID_VERIFY_SSL: "${UNRAID_VERIFY_SSL:-false}"
      BRAINLESS_MCP_BEARER_TOKEN: "${BRAINLESS_MCP_BEARER_TOKEN}"
      BRAINLESS_MCP_LOG_LEVEL: "${BRAINLESS_MCP_LOG_LEVEL:-INFO}"
      UNRAID_AUTO_START_SUBSCRIPTIONS: "${UNRAID_AUTO_START_SUBSCRIPTIONS:-false}"
    restart: unless-stopped
