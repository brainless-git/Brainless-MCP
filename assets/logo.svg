<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" width="720" height="220">

  <!-- Motion lines (speed blur to the left of ghost) -->
  <line x1="12"  y1="88"  x2="66" y2="88"  stroke="#e22828" stroke-width="3.5" stroke-linecap="round" opacity="0.25"/>
  <line x1="8"   y1="104" x2="62" y2="104" stroke="#e22828" stroke-width="3.5" stroke-linecap="round" opacity="0.45"/>
  <line x1="12"  y1="120" x2="66" y2="120" stroke="#e22828" stroke-width="3.5" stroke-linecap="round" opacity="0.70"/>

  <!-- Ghost body: domed head → straight sides → 4-bump wavy skirt -->
  <path d="
    M 72,108
    A 48,64 0 0,1 168,108
    L 168,163
    Q 156,188 144,163
    Q 132,188 120,163
    Q 108,188  96,163
    Q  84,188  72,163
    Z
  " fill="#e22828"/>

  <!-- Left eye -->
  <ellipse cx="103" cy="91"  rx="12"  ry="14.5" fill="white"/>
  <ellipse cx="106" cy="95"  rx="6"   ry="7.5"  fill="#1c1c1c"/>
  <circle  cx="101" cy="86"  r="3.5"            fill="white"/>

  <!-- Right eye -->
  <ellipse cx="137" cy="91"  rx="12"  ry="14.5" fill="white"/>
  <ellipse cx="140" cy="95"  rx="6"   ry="7.5"  fill="#1c1c1c"/>
  <circle  cx="135" cy="86"  r="3.5"            fill="white"/>

  <!-- Smile -->
  <path d="M 108,118 Q 120,134 132,118"
        stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Small MCP plug icon under ghost — three dots hinting at API nodes -->
  <circle cx="105" cy="200" r="3" fill="#e22828" opacity="0.55"/>
  <circle cx="120" cy="200" r="3" fill="#e22828" opacity="0.55"/>
  <circle cx="135" cy="200" r="3" fill="#e22828" opacity="0.55"/>
  <line x1="105" y1="200" x2="135" y2="200" stroke="#e22828" stroke-width="1.2" opacity="0.30"/>

  <!-- Wordmark: BRAINLESS (white, large) -->
  <text x="194" y="128"
        font-family="ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,monospace"
        font-size="56" font-weight="700"
        fill="#e8e8e8">BRAINLESS</text>

  <!-- Wordmark: — MCP (red, slightly smaller, same baseline) -->
  <text x="506" y="128"
        font-family="ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,monospace"
        font-size="38" font-weight="700"
        fill="#e22828">&#8212; MCP</text>

  <!-- Divider line between wordmark and tagline -->
  <line x1="194" y1="143" x2="650" y2="143"
        stroke="#3a3a3a" stroke-width="1"/>

  <!-- Tagline -->
  <text x="196" y="163"
        font-family="ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,monospace"
        font-size="13" font-weight="600"
        fill="#9a9a9a" letter-spacing="4">UNRAID CONTROL</text>

</svg>
